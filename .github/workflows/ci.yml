name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow the release workflow to reuse these jobs on a tag push without
  # ci.yml itself triggering on the tag (which is what caused the double run).
  workflow_call:

jobs:
  test:
    # Skip a plain branch push of the `npm version` release commit — the tag
    # drives release.yml, which reuses these jobs via workflow_call (a tag ref,
    # so the guard passes). Normal commits and PRs still run.
    if: ${{ startsWith(github.ref, 'refs/tags/') || !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - uses: oven-sh/setup-bun@v2
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: npm ci
      - run: npm run typecheck
      - run: npm run typecheck:test
      - run: npm test # unit tests (bun)
      - name: integration tests (gpio-sim virtual chip; self-skips if unavailable)
        run: |
          # gpio-sim is a kernel module; GitHub runners may not ship it. The
          # suite self-skips via gpioSimAvailable() when it can't be loaded.
          sudo modprobe gpio-sim 2>/dev/null || echo "gpio-sim unavailable; integration will self-skip"
          npm run build:native
          npm run test:integration

  prebuilds:
    # Zig cross-compiles every target from a single runner — no per-OS matrix.
    # Same release-commit skip guard as `test` (see above).
    if: ${{ startsWith(github.ref, 'refs/tags/') || !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: npm run build:prebuilds
      - uses: actions/upload-artifact@v6
        with:
          name: prebuilds
          path: prebuilds/
