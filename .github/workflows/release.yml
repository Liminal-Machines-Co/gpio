name: Release

# Tag-only. `npm version` commits + tags and `postversion` runs
# `git push --follow-tags`, which pushes the branch commit AND the tag. CI runs
# for the branch commit; this workflow runs only for the tag, so the two never
# double-fire the same workflow.
on:
  push:
    tags: ["v*"]

jobs:
  # Reuse the test + prebuilds jobs from ci.yml (via workflow_call) so a tag is
  # fully validated before publishing, with no duplicated job definitions.
  ci:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - uses: actions/download-artifact@v6
        with:
          name: prebuilds
          path: prebuilds/
      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match package.json version $PKG"
            exit 1
          fi
      - name: Verify all prebuilds are present
        run: |
          for d in darwin-arm64 darwin-x64 linux-x64 linux-arm64 win32-x64; do
            test -f "prebuilds/$d/gpio.node" || { echo "::error::missing prebuilds/$d/gpio.node"; exit 1; }
          done
      - run: npm ci
      # prepack (clean + build:ts) runs automatically during publish.
      - run: npm publish --provenance --access public
